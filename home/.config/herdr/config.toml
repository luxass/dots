# Herdr configuration managed by dots.
# Keep this intentionally small; agent integrations can add their own files.

onboarding = false

[terminal]
shell_mode = "auto"
new_cwd = "follow"

[theme]
name = "catppuccin"

[update]
channel = "stable"

[keys]
# Keep the default prefix (ctrl+b), but add quick indexed agent focusing.
focus_agent = "prefix+alt+1..9"

[ui]
agent_panel_scope = "all"
prompt_new_tab_name = true
show_agent_labels_on_pane_borders = false

[ui.toast]
delivery = "off"
delay_seconds = 1

[ui.sound]
enabled = false

[session]
# Useful once `herdr integration install pi` is installed.
resume_agents_on_restore = true

[remote]
manage_ssh_config = true

[experimental]
allow_nested = false
kitty_graphics = false
pane_history = false
