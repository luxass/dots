"$schema" = "https://starship.rs/config-schema.json"

command_timeout = 2000
format = "$directory$all"

[directory]
truncate_to_repo = false

[git_branch]
symbol = " "
truncation_length = 18

[package]
disabled = true

[nodejs]
# Only show Node for actual Node projects. This avoids unnecessary `node
# --version` calls in repos that just happen to contain JS/TS files.
detect_extensions = []
detect_files = ["package.json", ".node-version", ".nvmrc", ".tool-versions"]
detect_folders = ["node_modules"]

[character]
success_symbol = "[❖](bold green)"
error_symbol = "[❖](bold red)"
